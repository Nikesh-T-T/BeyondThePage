# Production Profile — PostgreSQL (Supabase)
spring.datasource.url=jdbc:postgresql://${DATABASE_HOST}:${DATABASE_PORT:5432}/${DATABASE_NAME}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}

# Disable H2 console in production
spring.h2.console.enabled=false

# JPA
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Server port (Render injects PORT)
server.port=${PORT:8080}

# CORS — set APP_CORS_ALLOWED_ORIGINS to your frontend URL
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:*}
